<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PMTiles Raster von GitHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- MapLibre GL JS -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.css" crossorigin="anonymous">
    <script src="https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.js" crossorigin="anonymous"></script>
    
    <!-- PMTiles Bibliothek -->
    <script src="https://unpkg.com/pmtiles@4.4.1/dist/pmtiles.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script type="text/javascript">
    // 1. Protokoll registrieren
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    // 2. Karte initialisieren
    const map = new maplibregl.Map({
        container: "map",
        zoom: 2,
        center: [10.4515, 51.1657],
        style: {
            version: 8,
            sources: {
                "raster-source": {
                    type: "raster",
                    // WICHTIG: Nutzen Sie die raw.githubusercontent.com URL
                    // Beispiel für eine öffentliche Test-Datei oder Ihre eigene im Repo
                    url: "pmtiles://https://estasch.github.io/Reiterkarte/OsmMaptiles/Basemap_Raster_BadUrach_Wald_dunkler.pmtiles", 
                    tileSize: 256,
                    attribution: "Maplibre Basemap.de"
                    //https://pasyzgzvjujqlwdotnkc.supabase.co/storage/v1/object/public/OSM%20Maptiles/PMTiles/Basemap_Raster_BadUrach_Wald_dunkler.pmtiles
                    //https://raw.githubusercontent.com/EStasch/Reiterkarte/main/OsmMaptiles/Basemap_Raster_BadUrach_Wald_dunkler.pmtiles
                    //https://github.com/EStasch/Reiterkarte/raw/refs/heads/main/OsmMaptiles/Basemap_Raster_BadUrach_Wald_dunkler.pmtiles
                    //https://github.com/MappleGaming208/Magic/blob/main/Scripts/lua/load.lua?raw=true
                    //https://github.com/EStasch/Reiterkarte/raw/refs/heads/main/OsmMaptiles/Basemap_Raster_BadUrach_Wald_dunkler.pmtiles
                    //https://raw.githubusercontent.com/EStasch/Reiterkarte/main/OSMMaptiles/Basemap_Raster_BadUrach_Wald_dunkler.pmtiles
                    //https://github.com/EStasch/Reiterkarte/blob/main/OsmMaptiles/Basemap_Raster_BadUrach_Wald_dunkler.pmtiles
                    //You can easily create this by filling the link with your details.........
                    //https://raw.githubusercontent.com/<your_Github_username>/<your_repository_name>/<branch_name>/<file_name>.<extension_name>
                    //Alternatively,
                    //https://github.com/<your_Github_username>/<your_repository_name>/<branch_name>/<file_name>.<extension_name>
                }
            },
            layers: [
                {
                    id: "raster-layer",
                    type: "raster",
                    source: "raster-source"
                }
            ]
        }
    });
</script>

</body>
</html>
