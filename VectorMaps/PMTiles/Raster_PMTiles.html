<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MapLibre Raster PMTiles Beispiel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- MapLibre CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.js"></script>
    
    <!-- PMTiles Bibliothek -->
    <script src="https://unpkg.com/pmtiles@4.4.1/dist/pmtiles.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script type="text/javascript">
    // 1. PMTiles-Protokoll registrieren
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    // 2. Karte initialisieren
    const map = new maplibregl.Map({
        container: "map",
        zoom: 3,
        center: [10.4515, 51.1657], // Zentrum von Deutschland
        style: {
            version: 8,
            sources: {
                "raster-source": {
                    type: "raster",
                    // Ersetzen Sie dies mit Ihrer eigenen PMTiles-URL
                    url: "pmtiles://https://pmtiles.io/protomaps(raster)natural_earth_2.pmtiles",
                    tileSize: 256
                }
            },
            layers: [
                {
                    id: "raster-layer",
                    type: "raster",
                    source: "raster-source"
                }
            ]
        }
    });

    // Navigation hinzufügen
    map.addControl(new maplibregl.NavigationControl());
</script>

</body>
</html>
