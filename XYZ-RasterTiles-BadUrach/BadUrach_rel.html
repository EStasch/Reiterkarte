<!DOCTYPE html>
<html>

<head>
    <title>Leaflet preview</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
        integrity="sha384-o/2yZuJZWGJ4s/adjxVW71R+EO/LyCwdQfP5UWSgX/w87iiTXuvDZaejd3TsN7mf" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
        integrity="sha384-okbbMvvx/qfQkmiQKfd5VifbKZ/W8p1qIsWvE1ROPUfHWsDcC8/BnHohF7vPg2T6" crossorigin=""></script>
    <style type="text/css">
        body {
            margin: 0;
            padding: 0;
        }

        html,
        body,
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>
        var map = L.map('map', { attributionControl: false }).setView([48.4889, 9.36984], 12); 
        L.control.attribution({ prefix: false }).addTo(map); 
        var tilesource_layer = L.tileLayer('./{z}/{x}/{y}.png', 
        { minZoom: 9, maxZoom: 17, tms: false, attribution: 'Created by QGIS' }).addTo(map);


        const ZoomViewer = L.Control.extend({
            onAdd() {
                const container = L.DomUtil.create('div');
                const gauge = L.DomUtil.create('div');
                container.style.width = '200px';
                container.style.background = 'rgba(255,255,255,0.5)';
                container.style.textAlign = 'left';
                map.on('zoomstart zoom zoomend', (ev) => {
                    gauge.innerHTML = `Zoom level: ${map.getZoom()}`;
                });
                container.appendChild(gauge);
                return container;
            }
        });

	   const zoomViewerControl = (new ZoomViewer()).addTo(map);
        </script>
</body>

</html>
